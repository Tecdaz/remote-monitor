name: watch-ci

# Wear OS watch-app CI (T-WATCH-42, REQ-WATCH-21, 22).
#
# Triggers on push and pull_request for any branch matching the
# `feat/watch-app-*` pattern. The pattern is intentionally narrow so
# the watch pipeline does not pay the AGP cold-cache cost for every
# commit on every other branch.
#
# Merge gate: any test failure blocks the workflow. The branch
# protection rule on `feat/watch-app-*` should be `ci/watch-ci:
# required` so PRs cannot merge with a red test run.
#
# AI attribution (REQ-WATCH-23) is intentionally NOT enforced here:
# the project's commit convention is "no Co-Authored-By trailers"
# and a code-review check is the right place to catch that, not a
# CI grep (which would also break on legitimate human contributors
# using AI assistants).
on:
  push:
    branches:
      - "feat/watch-app-*"
  pull_request:
    branches:
      - "feat/watch-app-*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK (API 36)
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools-version: "36.0.0"

      - name: Make gradlew executable
        working-directory: watch
        run: chmod +x ./gradlew

      - name: Assemble the watch debug APK
        working-directory: watch
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run the watch unit tests
        working-directory: watch
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload the debug APK
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-debug-apk
          path: watch/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload the test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-test-reports
          path: |
            watch/app/build/reports/tests/
            watch/app/build/reports/problems/
          retention-days: 14
