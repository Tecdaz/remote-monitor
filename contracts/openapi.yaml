openapi: 3.1.0
info:
  title: Remote Monitor API
  version: "1.0.0"
  description: "REST API for the remote patient monitoring PoC. HIPAA-like posture (POC, not implemented control): encryption in-transit and at-rest, audit log, defined retention, PII/clinical separation (`patient_number` is the only PII; clinical records use opaque `patient_id` UUIDs). Critical invariant: `delete-after-echo` — the watch only deletes a locally stored measurement after the backend echoes its `local_id` back in `accepted_ids`."
  contact:
    name: remote-monitor maintainers
    email: maintainers@remote-monitor.local
    url: https://github.com/remote-monitor/remote-monitor
  license:
    name: Proprietary (PoC)
    url: https://github.com/remote-monitor/remote-monitor/blob/main/LICENSE
servers:
  - url: http://localhost:8000/api/v1
    description: Local development (frontend at http://localhost:5173, CORS dev-only)
  - url: https://api.example.com/api/v1
    description: Production placeholder
tags:
  - name: watch
    description: Endpoints called by the Wear OS watch
  - name: frontend
    description: Endpoints called by the TanStack dashboard
  - name: admin
    description: Administrative operations (future)
paths:
  /api/v1/patients:
    post:
      tags: [watch, admin]
      operationId: registerPatient
      summary: Register a patient against a selected bed
      description: "The watch calls this after the operator selects a bed (1..5) on the bed picker. The patient_number ciphertext is no longer operator-typed — instead the backend derives it deterministically from `bed_number` via `pgp_sym_encrypt`. When `replace_active_session = true`, any active session on the same `bed_number` is atomically deactivated and a new session is created in the same transaction (per the partial UNIQUE index `ux_clinical_patients_active_bed` and the D16 `IntegrityError` mapping). When `replace_active_session = false` (default) and the bed is already active, the request is refused with `409 bed_now_occupied`. 503 with `Problem` if the database is degraded."
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegisterPatientRequest" } } }
      responses:
        "201": { description: Patient registered, content: { application/json: { schema: { $ref: "#/components/schemas/Patient" } } } }
        "409":
          description: "Bed is already occupied (`code: \"bed_now_occupied\"`). Caller can retry by re-fetching the snapshot and either picking another bed or setting `replace_active_session: true` (atomic replace)."
          content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } }
        "503": { description: backend degraded, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    get:
      tags: [frontend, admin]
      operationId: listPatients
      summary: List active patients
      description: Returns active patients only (`is_active=true`). PoC posture — no pagination. Inactive patients are visible via `GET /api/v1/patients/{patient_id}`.
      security: []
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties: { items: { type: array, items: { $ref: "#/components/schemas/Patient" } } }
  /api/v1/patients/{patient_id}:
    parameters: [{ $ref: "#/components/parameters/PatientIdPath" }]
    get:
      tags: [frontend, admin]
      operationId: getPatient
      summary: Fetch a single patient
      description: Returns the `Patient` record. 404 with `Problem` if not found.
      security: []
      responses:
        "200": { description: The patient, content: { application/json: { schema: { $ref: "#/components/schemas/Patient" } } } }
        "404": { description: Patient not found, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    delete:
      tags: [admin]
      operationId: deactivatePatient
      summary: Deactivate a patient (RESERVED)
      description: Out of scope for this change; URL reserved to lock the routing surface. Returns 501.
      security: []
      responses:
        "501": { description: Not implemented, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
  /api/v1/beds:
    get:
      tags: [watch, frontend, admin]
      operationId: getBedSnapshot
      summary: Per-bed occupancy snapshot
      description: "Returns the live occupancy state of every bed in the hardcoded 1..5 range. PoC: the bed universe is fixed at five beds; no creation endpoint exists. `is_occupied = true` iff a row exists with `bed_number = N AND is_active = true` in `clinical.patients`. The snapshot is computed in a single SELECT (no N+1) and is consistent under concurrent updates per the partial UNIQUE index `ux_clinical_patients_active_bed`."
      security: []
      responses:
        "200":
          description: Five-bed occupancy snapshot (PoC, hardcoded 1..5)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedSnapshotList"
        "503":
          description: backend degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api/v1/patients/{patient_id}/measurements:
    parameters: [{ $ref: "#/components/parameters/PatientIdPath" }]
    post:
      tags: [watch]
      operationId: uploadMeasurements
      summary: Upload a batch of measurements (delete-after-echo endpoint)
      description: "The watch uploads a batch. `delete-after-echo`: the watch deletes local Room rows ONLY for `local_id`s in `accepted_ids`; rejected items are preserved. The `X-Patient-Number` header MUST match the `{patient_id}` path parameter; otherwise 403. **Auto-register**: if the patient identified by `X-Patient-Number` is not yet registered, the backend auto-registers them in the same transaction using the device headers `X-Device-Model` and `X-OS-Version` (defaulting to `unknown` if absent). Subsequent uploads do not re-register. The backend MUST emit an audit entry `{actor, action: \"measurement.create\", count, ts}` for every 2xx batch POST. Body is 1-1000 `MeasurementBatch` items; 413 otherwise."
      parameters:
        - { in: header, name: X-Device-Model, required: false, schema: { type: string }, description: "Watch hardware model. Used only on first upload to auto-register the patient." }
        - { in: header, name: X-OS-Version, required: false, schema: { type: string }, description: "Watch OS version. Used only on first upload to auto-register the patient." }
      security: [{ PatientNumberHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 1000
              items: { $ref: "#/components/schemas/MeasurementBatch" }
      responses:
        "200": { description: "Batch processed; the watch deletes only the `local_id`s in `accepted_ids`", content: { application/json: { schema: { $ref: "#/components/schemas/BatchResponse" } } } }
        "403": { description: Missing or mismatched `X-Patient-Number` header, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
        "413": { description: Batch exceeds 1000 items, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    get:
      tags: [frontend, admin]
      operationId: listMeasurements
      summary: List historical measurements (cursor-paginated)
      description: "Cursor-paginated. Pass `cursor` from the previous response's `next_cursor` to fetch the next page. `next_cursor` is `null` when no more pages."
      security: []
      parameters:
        - { in: query, name: from,   schema: { type: string, format: date-time } }
        - { in: query, name: to,     schema: { type: string, format: date-time } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit,  schema: { type: integer, minimum: 1, maximum: 1000, default: 100 } }
      responses:
        "200": { description: A page of measurements, content: { application/json: { schema: { $ref: "#/components/schemas/MeasurementPage" } } } }
  /api/v1/measurements/{measurement_id}:
    get:
      tags: [frontend, admin]
      operationId: getMeasurement
      summary: Fetch a single measurement by ID
      description: Direct lookup of a stored measurement. Used by the frontend for audit/inspection drill-down.
      security: []
      parameters:
        - { in: path, name: measurement_id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: The measurement, content: { application/json: { schema: { $ref: "#/components/schemas/Measurement" } } } }
        "404": { description: Measurement not found, content: { application/json: { schema: { $ref: "#/components/schemas/Problem" } } } }
  /api/v1/health:
    get:
      tags: [admin]
      operationId: healthCheck
      summary: Liveness check
      description: "No authentication. Returns a status of `ok` when the service is up."
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties: { status: { type: string, enum: [ok] } }
  /api/v1/readyz:
    get:
      tags: [admin]
      operationId: readyCheck
      summary: Readiness check (probes PostgreSQL)
      description: "Returns 200 only if the service can complete a trivial query against PostgreSQL (e.g. `SELECT 1`). Use for Kubernetes readiness probes and for docker-compose `depends_on: condition: service_healthy`. 503 with `Problem` if the DB is unreachable."
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties: { status: { type: string, enum: [ready] } }
        "503":
          description: Service is not ready (DB unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  securitySchemes:
    PatientNumberHeader:
      type: apiKey
      in: header
      name: X-Patient-Number
      description: "Watch identification header. Must match the `{patient_id}` path parameter on `POST /patients/{patient_id}/measurements`."
  parameters:
    PatientIdPath:
      in: path
      name: patient_id
      required: true
      schema: { type: string, format: uuid }
      description: Opaque patient UUID. The only link from clinical data to PII.
  schemas:
    Patient:
      type: object
      description: "A registered patient. `patient_number` is the only PII field."
      required: [patient_id, patient_number, device_model, os_version, created_at, is_active, last_measurement_at]
      properties:
        patient_id:    { type: string, format: uuid, description: "Server-assigned opaque UUID. The only link from clinical records to PII." }
        patient_number: { type: string, description: "Encrypted bed number (PostgreSQL pgp_sym_encrypt of the bed number in 1..5). NOT an operator-typed identifier; do not display as plain text.", example: "MIIBiQYJKoZIhvcNAQDo+0D+lpNbQEDdHJlYXRlZEBrE1lMrQECREMwBQYDK2VwBCMQOlhLVDc4WnB1djVxTEhNSjFQcmZQTlpMNlVrQVhxY3NQNFhmN2tVS2tGM1VxSlhVSmkrRmhKN0FLb0o3SFd6RHhLdlJZRHJLZkx4c1Q3Z2VBQ0FvM2JrR0tuZUFIZlpPMU9wNkhRK09wcG9WM2d2bXF1TGIya3RCVVZtVGh1YVk4PQECMB2jTFPleV9bscAtxA99JeUQiEYD6v6+arT3qUUEAQH/" }
        device_model:  { type: string, description: "Watch hardware model.", example: Samsung Galaxy Watch 4 }
        os_version:    { type: string, description: "Watch OS version string.", example: "Wear OS 6 (API 36)" }
        created_at:    { type: string, format: date-time, description: "Server-assigned registration timestamp." }
        is_active:     { type: boolean, description: "Soft-delete flag. `false` means deactivated." }
        last_measurement_at: { type: string, format: date-time, description: "Timestamp of the last accepted measurement batch. Non-nullable; defaults to registration time via the DDL DEFAULT." }
    RegisterPatientRequest:
      type: object
      description: "Payload for `POST /patients`. Replaces the free-form `patient_number` operator-typed identifier with `bed_number` in 1..5 (the watch's bed picker now emits this). `replace_active_session` opts into an atomic replace of any active session on the same bed; absent or `false` returns `409 bed_now_occupied` when the bed is currently active."
      required: [bed_number, device_model, os_version]
      properties:
        bed_number: { type: integer, minimum: 1, maximum: 5, description: "Selected bed in 1..5 (PoC hardcoded range).", examples: [3] }
        device_model: { type: string, examples: ["samsung SM-R870"] }
        os_version: { type: string, examples: ["16 (API 36)"] }
        replace_active_session: { type: boolean, default: false, description: "When `true`, atomically deactivates the active session on the same bed and creates a new one. When `false` (default), the request is refused with `409 bed_now_occupied` if the bed is active." }
    BedSnapshot:
      type: object
      required: [bed_number, is_occupied]
      properties:
        bed_number: { type: integer, minimum: 1, maximum: 5, description: "Bed number in 1..5 (PoC hardcoded range).", examples: [3] }
        is_occupied: { type: boolean, description: "`true` iff a `clinical.patients` row exists with `bed_number = N AND is_active = true`." }
        current_patient_id: { type: [string, "null"], format: uuid, description: "Opaque UUID of the active patient on this bed, or `null` when `is_occupied = false`." }
    BedSnapshotList:
      type: array
      description: "Per-bed occupancy snapshot. Always length 5 (PoC hardcoded bed universe)."
      items: { $ref: "#/components/schemas/BedSnapshot" }
      minItems: 5
      maxItems: 5
    MeasurementBatch:
      type: object
      description: "One measurement submitted by the watch. Either or both vital signs may be null if the sensor failed."
      required: [local_id, timestamp]
      properties:
        local_id:     { type: string, format: uuid, description: "Client-generated UUID v4. Idempotency key. The backend unique-constraints on `(patient_id, local_id)`." }
        timestamp:    { type: string, format: date-time, description: "ISO 8601 with timezone, within the last 24 hours and not more than 5 minutes in the future." }
        heart_rate_bpm: { type: [integer, "null"], minimum: 1, maximum: 299, description: "Heart rate in BPM. `null` if the sensor failed." }
        spo2_percent:   { type: [number, "null"], exclusiveMinimum: 0, maximum: 100, description: "SpO2 percentage (0-100). `null` if the sensor failed." }
        ibis_ms:
          type: [array, "null"]
          items: { type: integer, minimum: 1, maximum: 5000 }
          description: "Inter-beat intervals in milliseconds (Samsung Health Sensor SDK IBI_LIST). `null` for devices that do not expose IBI samples. Per-item clamp `[1, 5000]` matches the Pydantic field validator."
        ibis_status:
          type: [array, "null"]
          items: { type: integer, minimum: 0, maximum: 2147483647 }
          default: null
          description: "Per-beat Samsung IBI quality flag (IBI_STATUS_LIST). `0` = noisy/rejected, non-zero = accepted. Length must match `ibis_ms` when present. `null` for devices that do not provide status."
    Measurement:
      allOf:
        - $ref: "#/components/schemas/MeasurementBatch"
        - type: object
          required: [id, patient_id, timestamp, received_at]
          properties:
            id:          { type: string, format: uuid, description: "Server-assigned measurement ID." }
            patient_id:  { type: string, format: uuid, description: "Opaque UUID; the only link from clinical data to PII is via the `Patient` record." }
            received_at: { type: string, format: date-time, description: "Server-assigned ingestion timestamp." }
    BatchResponse:
      type: object
      description: "The watch deletes local Room rows ONLY for `local_id`s in `accepted_ids` (delete-after-echo)."
      required: [accepted_ids, rejected]
      properties:
        accepted_ids: { type: array, items: { type: string, format: uuid }, description: "The `local_id`s the backend persisted (or no-op-deduped). The watch deletes these." }
        rejected:     { type: array, items: { $ref: "#/components/schemas/RejectedMeasurement" } }
    RejectedMeasurement:
      type: object
      description: "One item the backend refused. The watch keeps the Room row for inspection/retry."
      required: [local_id, reason]
      properties:
        local_id: { type: string, format: uuid }
        reason:   { type: string, description: "Human-readable reason. Not a code (PoC)." }
    Problem:
      type: object
      description: "RFC 7807-style problem detail."
      required: [detail, code]
      properties:
        detail: { type: string }
        code:   { type: string, description: "Stable machine-readable error code." }
    MeasurementPage:
      type: object
      description: "A cursor-paginated page of measurements."
      required: [items, next_cursor]
      properties:
        items:       { type: array, items: { $ref: "#/components/schemas/Measurement" } }
        next_cursor: { type: [string, "null"], description: "Opaque cursor for the next page. `null` when no more pages." }
